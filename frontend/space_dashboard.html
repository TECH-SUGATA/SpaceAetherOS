<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AetherOS — Real-Time Global Space Command</title>

<!-- Three.js for 3D Earth -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<!-- React 18 -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel for JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>

<style>
:root{
  --bg:#020912;
  --bg2:#060f1e;
  --bg3:#0a1628;
  --primary:#00e5ff;
  --primary2:#00b8d9;
  --secondary:#7c3aed;
  --accent:#f97316;
  --green:#00e676;
  --red:#ff1744;
  --yellow:#ffea00;
  --text:#e2e8f7;
  --dim:#64748b;
  --border:rgba(0,229,255,0.12);
  --glass:rgba(6,15,30,0.7);
  --glow:0 0 20px rgba(0,229,255,0.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100dvh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.3);border-radius:2px;}
.orb{font-family:'Orbitron',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}
.msym{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;user-select:none;vertical-align:middle;}
.msym.f1{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}

/* ═══ GLASS CARDS ═══ */
.glass{background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:12px;}
.glass-strong{background:rgba(2,9,18,0.85);backdrop-filter:blur(40px);border:1px solid rgba(0,229,255,0.2);}
.glass-card{background:rgba(10,22,40,0.6);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:12px;border-top:1px solid rgba(0,229,255,0.25);}
.border-glow{border:1px solid rgba(0,229,255,0.3);box-shadow:0 0 20px rgba(0,229,255,0.08),inset 0 0 20px rgba(0,229,255,0.02);}

/* ═══ GLOW EFFECTS ═══ */
.glow-text{text-shadow:0 0 20px rgba(0,229,255,0.8),0 0 40px rgba(0,229,255,0.4);}
.glow-purple{text-shadow:0 0 20px rgba(124,58,237,0.9);}
.glow-orange{text-shadow:0 0 20px rgba(249,115,22,0.9);}
.glow-green{text-shadow:0 0 20px rgba(0,230,118,0.9);}
.glow-box{box-shadow:0 0 30px rgba(0,229,255,0.2);}
.glow-box-purple{box-shadow:0 0 30px rgba(124,58,237,0.2);}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes scanline{0%{top:0%}100%{top:100%}}
@keyframes bgShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes ripple{0%{transform:scale(1);opacity:0.8}100%{transform:scale(3);opacity:0}}
@keyframes orbitISS{0%{transform:rotate(0deg) translateX(110px) rotate(0deg)}100%{transform:rotate(360deg) translateX(110px) rotate(-360deg)}}
@keyframes neonFlicker{0%,100%{opacity:1}92%,96%{opacity:0.8}94%{opacity:0.4}}
@keyframes starsMove{from{background-position:0 0}to{background-position:100px 100px}}
@keyframes countdownPulse{0%,100%{box-shadow:0 0 10px rgba(0,229,255,0.3)}50%{box-shadow:0 0 30px rgba(0,229,255,0.7)}}
@keyframes barLoad{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes voiceWave{0%,100%{height:6px}50%{height:24px}}
@keyframes typingDot{0%,60%,100%{opacity:0;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

.anim-fade{animation:fadeIn 0.6s ease forwards;}
.anim-slide{animation:slideLeft 0.5s ease forwards;}
.anim-float{animation:float 4s ease-in-out infinite;}
.anim-spin{animation:spin 20s linear infinite;}
.anim-flicker{animation:neonFlicker 4s ease-in-out infinite;}
.anim-pulse{animation:pulseDot 2s ease-in-out infinite;}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;letter-spacing:0.05em;text-transform:uppercase;border:none;cursor:pointer;transition:all 0.3s ease;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,#00e5ff,#0097a7);color:#020912;box-shadow:0 0 20px rgba(0,229,255,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(0,229,255,0.5);}
.btn-secondary{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:white;box-shadow:0 0 20px rgba(124,58,237,0.3);}
.btn-secondary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(124,58,237,0.5);}
.btn-outline{background:transparent;border:1px solid rgba(0,229,255,0.4);color:var(--primary);}
.btn-outline:hover{background:rgba(0,229,255,0.08);border-color:var(--primary);box-shadow:0 0 20px rgba(0,229,255,0.2);}
.btn-danger{background:linear-gradient(135deg,#ef4444,#b91c1c);color:white;}
.btn:active{transform:scale(0.97);}

/* ═══ INPUTS ═══ */
.input-wrap{position:relative;}
.input-field{width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(0,229,255,0.2);border-radius:8px;padding:14px 16px 10px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;transition:all 0.3s;}
.input-field:focus{border-color:var(--primary);box-shadow:0 0 0 1px rgba(0,229,255,0.3),0 4px 20px rgba(0,229,255,0.15);}
.input-label{position:absolute;top:12px;left:16px;font-size:13px;color:var(--dim);pointer-events:none;transition:all 0.3s;text-transform:uppercase;letter-spacing:0.06em;}
.input-field:focus~.input-label,.input-field:not(:placeholder-shown)~.input-label{top:4px;font-size:10px;color:var(--primary);}
.input-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:20px;transition:color 0.3s;}
.input-field:focus~.input-icon{color:var(--primary);}

/* ═══ STAR BACKGROUND ═══ */
.star-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 100% 80% at 20% 10%,rgba(0,229,255,0.04) 0%,transparent 55%),
             radial-gradient(ellipse 80% 60% at 80% 90%,rgba(124,58,237,0.05) 0%,transparent 55%),
             radial-gradient(ellipse 60% 40% at 50% 50%,rgba(249,115,22,0.02) 0%,transparent 60%),var(--bg);
}
.stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ═══ PAGES ═══ */
.page{display:none;min-height:100dvh;position:relative;z-index:1;}
.page.active{display:flex;flex-direction:column;}

/* ═══ NAVBAR ═══ */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:70px;background:rgba(2,9,18,0.85);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;}

/* ═══ SIDEBAR ═══ */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:rgba(4,12,24,0.92);backdrop-filter:blur(40px);border-right:1px solid var(--border);z-index:50;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;padding-top:70px;}
.sidebar.closed{transform:translateX(-100%);}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:49;display:none;}
.sidebar-overlay.show{display:block;}
@media(min-width:1024px){.sidebar{transform:translateX(0)!important;}.sidebar-overlay{display:none!important;}}
.nav-link{display:flex;align-items:center;gap:14px;padding:12px 20px;color:var(--dim);font-size:13px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border-left:3px solid transparent;transition:all 0.25s;text-decoration:none;}
.nav-link:hover{color:var(--text);background:rgba(0,229,255,0.04);}
.nav-link.active{color:var(--primary);background:rgba(0,229,255,0.06);border-left-color:var(--primary);box-shadow:inset -10px 0 20px -10px rgba(0,229,255,0.15);}
.nav-link.active .msym{filter:drop-shadow(0 0 6px rgba(0,229,255,0.8));}

/* ═══ TOPBAR ═══ */
.topbar{position:fixed;top:0;right:0;left:0;height:70px;background:rgba(2,9,18,0.85);backdrop-filter:blur(30px);border-bottom:1px solid var(--border);z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:left 0.35s ease;}
@media(min-width:1024px){.topbar{left:240px;}}

/* ═══ MAIN CONTENT ═══ */
.main-wrap{padding-top:70px;}
@media(min-width:1024px){.main-wrap{margin-left:240px;}}
.main-content{padding:clamp(16px,3vw,32px);max-width:1600px;}

/* ═══ BOTTOM NAV MOBILE ═══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(4,12,24,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50;display:flex;justify-content:space-around;padding:8px 0 clamp(8px,env(safe-area-inset-bottom,8px),24px);}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--dim);font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;transition:color 0.2s;padding:4px 8px;min-width:52px;}
.bottom-nav-item.active,.bottom-nav-item:hover{color:var(--primary);}
.bottom-nav-item .msym{font-size:22px;}
@media(min-width:1024px){.bottom-nav{display:none;}}
@media(max-width:1023px){.main-content{padding-bottom:80px;}}

/* ═══ GRID SYSTEMS ═══ */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
@media(max-width:1280px){.grid-4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
@media(max-width:900px){.grid-3{grid-template-columns:repeat(2,1fr);}}

/* ═══ STAT CARDS ═══ */
.stat-card{padding:20px;border-radius:12px;background:rgba(10,22,40,0.7);border:1px solid var(--border);border-top:1px solid rgba(0,229,255,0.25);position:relative;overflow:hidden;transition:all 0.3s;}
.stat-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--primary),transparent);opacity:0.5;}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(0,229,255,0.25);box-shadow:0 8px 40px rgba(0,229,255,0.08);}
.hud-corner::after{content:'';position:absolute;bottom:8px;right:8px;width:14px;height:14px;border-bottom:2px solid rgba(0,229,255,0.4);border-right:2px solid rgba(0,229,255,0.4);}
.hud-corner::before{content:'';position:absolute;top:8px;left:8px;width:14px;height:14px;border-top:2px solid rgba(0,229,255,0.4);border-left:2px solid rgba(0,229,255,0.4);}

/* ═══ BADGES ═══ */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.badge-live{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green);}
.badge-upcoming{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:var(--primary);}
.badge-scheduled{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.3);color:var(--accent);}
.badge-scrubbed{background:rgba(255,23,68,0.1);border:1px solid rgba(255,23,68,0.3);color:var(--red);}
.badge-success{background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.3);color:var(--green);}

/* ═══ SECTION HEADERS ═══ */
.section-head{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.section-icon{width:38px;height:38px;border-radius:8px;background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2);display:flex;align-items:center;justify-content:center;color:var(--primary);}
.section-title{font-family:'Orbitron',sans-serif;font-size:clamp(16px,2vw,20px);font-weight:600;color:var(--text);}

/* ═══ LAUNCH COUNTDOWN ═══ */
.cd-block{display:flex;flex-direction:column;align-items:center;gap:6px;animation:countdownPulse 2s ease-in-out infinite;}
.cd-num{font-family:'Orbitron',sans-serif;font-size:clamp(28px,4vw,52px);font-weight:700;color:var(--primary);line-height:1;text-shadow:0 0 30px rgba(0,229,255,0.5);}
.cd-label{font-size:10px;color:var(--dim);letter-spacing:0.15em;font-weight:600;}
.cd-sep{font-size:clamp(24px,3vw,40px);color:rgba(0,229,255,0.3);align-self:flex-start;margin-top:4px;}

/* ═══ ISS MAP ═══ */
.iss-map{position:relative;width:100%;border-radius:14px;overflow:hidden;border:1px solid rgba(0,229,255,0.1);}
.iss-marker{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--primary);box-shadow:0 0 20px rgba(0,229,255,1),0 0 40px rgba(0,229,255,0.5);transform:translate(-50%,-50%);z-index:10;}
.iss-ring{position:absolute;border-radius:50%;border:1px solid var(--primary);transform:translate(-50%,-50%);animation:ripple 2s ease-out infinite;}

/* ═══ AI CHATBOT ═══ */
.chat-wrap{display:flex;flex-direction:column;gap:14px;overflow-y:auto;max-height:400px;padding:4px;}
.chat-wrap::-webkit-scrollbar{width:3px;}
.msg-ai{align-self:flex-start;background:rgba(10,22,40,0.8);border:1px solid rgba(0,229,255,0.15);border-radius:0 12px 12px 12px;padding:12px 16px;max-width:80%;}
.msg-user{align-self:flex-end;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(76,29,149,0.3));border:1px solid rgba(124,58,237,0.3);border-radius:12px 0 12px 12px;padding:12px 16px;max-width:80%;}
.voice-wave{display:flex;align-items:flex-end;gap:3px;height:28px;}
.wave-bar{width:3px;background:var(--primary);border-radius:2px;transform-origin:bottom;}

/* ═══ PROGRESS BARS ═══ */
.progress-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transform-origin:left;animation:barLoad 1s ease forwards;}
.progress-cyan{background:linear-gradient(90deg,var(--primary2),var(--primary));}
.progress-purple{background:linear-gradient(90deg,#4c1d95,var(--secondary));}
.progress-orange{background:linear-gradient(90deg,#c2410c,var(--accent));}
.progress-green{background:linear-gradient(90deg,#059669,var(--green));}
.progress-red{background:linear-gradient(90deg,#b91c1c,var(--red));}

/* ═══ NOTIFICATION BUBBLE ═══ */
.notif-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red);}

/* ═══ AURORA STRIP ═══ */
.aurora{height:2px;background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent),var(--primary));background-size:200% 100%;animation:bgShift 4s linear infinite;}

/* ═══ TOOLTIP ═══ */
.tooltip-wrap{position:relative;}
.tooltip-tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(4,12,24,0.95);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;color:var(--text);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:200;}
.tooltip-wrap:hover .tooltip-tip{opacity:1;}

/* ═══ LOADING SPINNER ═══ */
.spin-loader{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}

/* ═══ GALLERY ═══ */
.gallery-img{border-radius:10px;overflow:hidden;position:relative;cursor:pointer;border:1px solid var(--border);transition:all 0.4s;}
.gallery-img:hover{transform:scale(1.02);border-color:rgba(0,229,255,0.3);box-shadow:0 8px 40px rgba(0,229,255,0.1);}
.gallery-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s;}
.gallery-img:hover img{transform:scale(1.06);}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(2,9,18,0.9),transparent 55%);opacity:0;transition:opacity 0.3s;}
.gallery-img:hover .gallery-overlay{opacity:1;}

/* ═══ THREAT LEVEL ═══ */
.threat-0{color:var(--green);}
.threat-1{color:var(--yellow);}
.threat-2{color:var(--accent);}
.threat-3{color:var(--red);}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-box{background:rgba(4,12,24,0.98);border:1px solid rgba(0,229,255,0.2);border-radius:16px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;}

/* ═══ RESPONSIVE TEXT ═══ */
.text-hero{font-size:clamp(36px,6vw,80px);}
.text-xl2{font-size:clamp(24px,3.5vw,48px);}
.text-lg2{font-size:clamp(18px,2.5vw,28px);}

/* ═══ MISC ═══ */
.divider{height:1px;background:var(--border);margin:16px 0;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.15);font-size:12px;color:var(--primary);font-weight:600;}
.flex-center{display:flex;align-items:center;justify-content:center;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.gap-2{gap:8px;} .gap-3{gap:12px;} .gap-4{gap:16px;}
.mt-2{margin-top:8px;} .mt-3{margin-top:12px;} .mt-4{margin-top:16px;} .mt-6{margin-top:24px;}
.mb-2{margin-bottom:8px;} .mb-3{margin-bottom:12px;} .mb-4{margin-bottom:16px;}
.p-4{padding:16px;} .p-5{padding:20px;} .p-6{padding:24px;}
.rounded-xl{border-radius:12px;} .rounded-2xl{border-radius:16px;} .rounded-full{border-radius:999px;}
.w-full{width:100%;} .flex{display:flex;} .flex-col{flex-direction:column;}
.text-center{text-align:center;} .opacity-60{opacity:0.6;}
.relative{position:relative;} .overflow-hidden{overflow:hidden;}

/* Page transitions */
.page-enter{animation:fadeIn 0.5s ease forwards;}

/* Scanline effect */
.scanline-wrap{position:relative;overflow:hidden;}
.scanline-wrap::after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.2),transparent);animation:scanline 4s linear infinite;pointer-events:none;}

/* Orbit line */
.orbit-line{position:absolute;border-radius:50%;border:1px dashed rgba(0,229,255,0.15);pointer-events:none;}
</style>
</head>
<body>

<canvas class="stars-canvas" id="starCanvas"></canvas>
<div class="star-bg"></div>
<div id="root"></div>

<script>
// ── Star field canvas ──
(function(){
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  function init(){
    resize();
    stars = Array.from({length:250},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.5+0.2,
      alpha:Math.random()*0.8+0.1,
      speed:Math.random()*0.15+0.02,
      color:['#ffffff','#a0e8ff','#c8b8ff','#ffd0a8'][Math.floor(Math.random()*4)]
    }));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.color;
      ctx.globalAlpha=s.alpha*(0.6+0.4*Math.sin(Date.now()*s.speed*0.003));
      ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);
  init(); draw();
})();
</script>

// ══════════════════════════════════════════
// THREE.JS EARTH COMPONENT
// ══════════════════════════════════════════
function Earth3D({size=500}){
  const mountRef = useRef(null);
  useEffect(()=>{
    if(!mountRef.current||!window.THREE) return;
    const THREE = window.THREE;
    const W = mountRef.current.clientWidth||size;
    const H = mountRef.current.clientHeight||size;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, W/H, 0.1, 1000);
    camera.position.z = 2.8;
    const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000, 0);
    mountRef.current.appendChild(renderer.domElement);

    // Create earth texture procedurally
    const texW=2048,texH=1024;
    const texCanvas=document.createElement('canvas');
    texCanvas.width=texW; texCanvas.height=texH;
    const tc=texCanvas.getContext('2d');

    // Ocean
    const og=tc.createLinearGradient(0,0,texW,texH);
    og.addColorStop(0,'#0c2461'); og.addColorStop(0.5,'#1a3a5c'); og.addColorStop(1,'#0d1f3c');
    tc.fillStyle=og; tc.fillRect(0,0,texW,texH);

    // Helper for drawing landmasses
    function poly(pts,col){
      tc.fillStyle=col; tc.beginPath();
      tc.moveTo(pts[0][0]*texW,pts[0][1]*texH);
      for(let i=1;i<pts.length;i++) tc.lineTo(pts[i][0]*texW,pts[i][1]*texH);
      tc.closePath(); tc.fill();
    }
    function blob(cx,cy,rx,ry,rot=0,col='#1b5e20'){
      tc.save(); tc.fillStyle=col;
      tc.translate(cx*texW,cy*texH); tc.rotate(rot);
      tc.beginPath(); tc.ellipse(0,0,rx*texW,ry*texH,0,0,Math.PI*2);
      tc.fill(); tc.restore();
    }
    const G='#1b5e20',G2='#2e7d32',G3='#388e3c',D='#6d4c41',D2='#795548',ICE='rgba(220,240,255,0.9)';

    // North America
    poly([[.07,.10],[.15,.07],[.25,.09],[.33,.17],[.36,.27],[.31,.40],[.27,.50],[.22,.57],[.17,.59],[.13,.53],[.08,.44],[.05,.32],[.06,.20]],G);
    poly([[.26,.09],[.34,.06],[.38,.12],[.36,.20],[.29,.19],[.26,.13]],G2); // Canadian shield
    blob(.15,.57,.03,.05,0.2,G3); blob(.24,.55,.025,.04,0,G3); // Mexico/Central America
    blob(.285,.08,.05,.07,0.2,ICE); // Greenland

    // South America
    poly([[.285,.44],[.32,.42],[.38,.47],[.40,.56],[.38,.66],[.34,.72],[.29,.70],[.26,.62],[.25,.52]],G2);
    blob(.30,.50,.02,.03,0,D2); blob(.35,.55,.025,.04,0,D); // Amazon/desert

    // Europe
    blob(.49,.22,.04,.08,0.1,G); blob(.51,.18,.025,.05,0.3,G2); blob(.54,.20,.02,.04,0.0,G3);
    blob(.48,.26,.03,.04,0,D); // Iberia

    // Africa
    poly([[.46,.31],[.51,.27],[.57,.30],[.59,.40],[.58,.56],[.55,.67],[.51,.70],[.47,.67],[.44,.56],[.43,.42]],D2);
    blob(.50,.38,.03,.05,0,G3); blob(.48,.48,.025,.03,0.2,G2); // rainforest
    blob(.52,.62,.025,.04,0,D); // Kalahari

    // Asia - main body
    poly([[.56,.12],[.68,.08],[.80,.09],[.90,.12],[.98,.18],[.99,.28],[.96,.38],[.88,.44],[.78,.48],[.68,.50],[.60,.47],[.56,.38],[.54,.25],[.55,.17]],G);
    blob(.80,.22,.04,.06,0.2,G2); // Siberia detail
    blob(.68,.52,.03,.06,0,G3); // India
    blob(.78,.50,.04,.05,0.15,G3); // SE Asia
    blob(.88,.35,.02,.03,0,D); // Gobi

    // Australia
    poly([[.81,.57],[.87,.56],[.93,.59],[.95,.65],[.93,.73],[.87,.76],[.81,.73],[.79,.66]],D2);
    blob(.85,.63,.02,.03,0.1,G3); // eastern coast

    // Antarctica
    tc.fillStyle='rgba(200,230,255,0.8)'; tc.fillRect(0,texH*.82,texW,texH*.18);
    blob(.25,.88,.07,.04,0.1,ICE); blob(.60,.86,.09,.05,0.2,ICE); blob(.85,.87,.06,.04,0,ICE);
    // Arctic
    tc.fillStyle='rgba(200,230,255,0.7)'; tc.fillRect(0,0,texW,texH*.04);

    // Subtle ocean texture
    for(let i=0;i<3000;i++){
      tc.fillStyle=`rgba(255,255,255,${Math.random()*.04})`;
      tc.beginPath(); tc.arc(Math.random()*texW,Math.random()*texH,Math.random()*1.5,0,Math.PI*2);
      tc.fill();
    }

    // City lights (tiny bright dots)
    const cities = [[.14,.35],[.17,.35],[.20,.30],[.49,.22],[.50,.28],[.52,.25],[.63,.20],[.70,.25],[.75,.20],[.78,.28]];
    cities.forEach(([cx,cy])=>{
      tc.fillStyle='rgba(255,220,100,0.9)';
      tc.beginPath(); tc.arc(cx*texW,cy*texH,2,0,Math.PI*2); tc.fill();
      tc.fillStyle='rgba(255,220,100,0.3)';
      tc.beginPath(); tc.arc(cx*texW,cy*texH,6,0,Math.PI*2); tc.fill();
    });

    const earthTex = new THREE.CanvasTexture(texCanvas);
    const earthGeo = new THREE.SphereGeometry(1, 64, 64);
    const earthMat = new THREE.MeshPhongMaterial({map:earthTex, shininess:15, specular:new THREE.Color(0x334455)});
    const earth = new THREE.Mesh(earthGeo, earthMat);
    scene.add(earth);

    // Atmosphere glow
    const atmosGeo = new THREE.SphereGeometry(1.04, 32, 32);
    const atmosMat = new THREE.MeshPhongMaterial({color:0x0088ff, transparent:true, opacity:0.10, side:THREE.FrontSide});
    const atmos = new THREE.Mesh(atmosGeo, atmosMat);
    scene.add(atmos);

    // Outer glow ring
    const rimGeo = new THREE.SphereGeometry(1.08, 32, 32);
    const rimMat = new THREE.MeshPhongMaterial({color:0x00aaff, transparent:true, opacity:0.04, side:THREE.BackSide});
    const rim = new THREE.Mesh(rimGeo, rimMat);
    scene.add(rim);

    // ISS orbit line
    const orbitPts=[];
    for(let i=0;i<=128;i++){
      const a=(i/128)*Math.PI*2;
      orbitPts.push(new THREE.Vector3(Math.cos(a)*1.12, Math.sin(a)*0.35, Math.sin(a)*1.12));
    }
    const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPts);
    const orbitMat = new THREE.LineBasicMaterial({color:0x00e5ff, opacity:0.35, transparent:true});
    scene.add(new THREE.Line(orbitGeo, orbitMat));

    // ISS dot
    const issGeo = new THREE.SphereGeometry(0.015, 8, 8);
    const issMat = new THREE.MeshBasicMaterial({color:0x00e5ff});
    const iss = new THREE.Mesh(issGeo, issMat);
    scene.add(iss);

    // Lights
    scene.add(new THREE.AmbientLight(0x223344, 1.2));
    const sunLight = new THREE.DirectionalLight(0xffeedd, 2.0);
    sunLight.position.set(5, 3, 5);
    scene.add(sunLight);

    // Cloud layer (subtle)
    const cloudGeo = new THREE.SphereGeometry(1.015, 32, 32);
    const cloudMat = new THREE.MeshPhongMaterial({color:0xffffff, transparent:true, opacity:0.06});
    scene.add(new THREE.Mesh(cloudGeo, cloudMat));

    let frame, issAngle=0;
    const animate=()=>{
      frame=requestAnimationFrame(animate);
      earth.rotation.y += 0.002;
      atmos.rotation.y += 0.0015;
      issAngle += 0.008;
      iss.position.set(Math.cos(issAngle)*1.12, Math.sin(issAngle)*0.35, Math.sin(issAngle)*1.12);
      renderer.render(scene, camera);
    };
    animate();
    return ()=>{ cancelAnimationFrame(frame); if(mountRef.current && renderer.domElement.parentNode===mountRef.current) mountRef.current.removeChild(renderer.domElement); renderer.dispose(); };
  },[]);
  return <div ref={mountRef} style={{width:'100%',height:'100%'}} />;
}

// SIGNUP PAGE
// ══════════════════════════════════════════
function SignupPage(){
  const {setPage,setUser}=useApp();
  const [form,setForm]=useState({name:'',email:'',pass:'',confirm:''});
  const [loading,setLoading]=useState(false);
  const strength = form.pass.length===0?0:form.pass.length<6?1:form.pass.length<10?2:form.pass.length<14?3:4;
  const strengthColors=['','var(--red)','var(--accent)','var(--yellow)','var(--green)'];
  const strengthLabels=['','Weak','Fair','Good','Strong'];

  const signup=async(e)=>{
    e.preventDefault();
    setLoading(true); await sleep(1400);
    setUser({name:form.name||'Commander',email:form.email,avatar:form.name[0]?.toUpperCase()||'C'});
    setPage('dashboard');
  };

  return (
    <div style={{minHeight:'100dvh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,position:'relative',zIndex:1}}>
      <button onClick={()=>setPage('landing')} style={{position:'fixed',top:20,left:20,background:'rgba(255,255,255,0.05)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 16px',color:'var(--dim)',fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6,zIndex:10,transition:'all 0.2s'}} onMouseEnter={e=>{e.currentTarget.style.color='var(--primary)';}} onMouseLeave={e=>{e.currentTarget.style.color='var(--dim)';}}>
        <span className="msym" style={{fontSize:16}}>arrow_back</span> Back
      </button>

      <div style={{width:'100%',maxWidth:460,animation:'fadeIn 0.6s ease forwards'}}>
        <div className="glass-strong" style={{borderRadius:18,overflow:'hidden'}}>
          <div style={{height:2,background:'linear-gradient(90deg,transparent,var(--secondary),var(--primary),transparent)'}}/>
          <div style={{padding:'clamp(28px,5vw,48px)'}}>
            <div style={{textAlign:'center',marginBottom:28}}>
              <span className="msym" style={{fontSize:44,color:'var(--secondary)',filter:'drop-shadow(0 0 12px rgba(124,58,237,0.8))',display:'block',marginBottom:10}}>person_add</span>
              <h1 className="orb" style={{fontSize:'clamp(18px,3vw,26px)',fontWeight:700,color:'var(--text)',marginBottom:4}}>Join Mission Control</h1>
              <p style={{fontSize:12,color:'var(--dim)',letterSpacing:'0.1em',textTransform:'uppercase'}}>Create Your Commander Profile</p>
            </div>

            <form onSubmit={signup} style={{display:'flex',flexDirection:'column',gap:16}}>
              {[
                {key:'name',label:'Commander Name',icon:'person',type:'text'},
                {key:'email',label:'Email Address',icon:'email',type:'email'},
                {key:'pass',label:'Security Passkey',icon:'lock',type:'password'},
                {key:'confirm',label:'Confirm Passkey',icon:'lock_open',type:'password'},
              ].map(f=>(
                <div key={f.key} className="input-wrap">
                  <input type={f.type} className="input-field" placeholder=" "
                    value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))}/>
                  <label className="input-label">{f.label}</label>
                  <span className="msym input-icon">{f.icon}</span>
                </div>
              ))}

              {/* Password strength */}
              {form.pass.length>0&&(
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:10,color:'var(--dim)',letterSpacing:'0.1em',textTransform:'uppercase'}}>Passkey Strength</span>
                    <span style={{fontSize:10,color:strengthColors[strength],fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase'}}>{strengthLabels[strength]}</span>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    {[1,2,3,4].map(l=>(
                      <div key={l} style={{flex:1,height:4,borderRadius:2,background:l<=strength?strengthColors[strength]:'rgba(255,255,255,0.08)',transition:'background 0.3s',boxShadow:l<=strength?`0 0 8px ${strengthColors[strength]}50`:''}}/>
                    ))}
                  </div>
                </div>
              )}

              <button type="submit" className="btn btn-secondary" style={{width:'100%',padding:14,justifyContent:'center',fontSize:14,marginTop:4}} disabled={loading}>
                {loading?<><span className="spin-loader" style={{width:18,height:18,borderWidth:2,borderColor:'rgba(255,255,255,0.3)',borderTopColor:'white'}}/> Creating Profile...</>:<><span className="msym">add_circle</span> Initialize Profile</>}
              </button>
            </form>

            <p style={{textAlign:'center',fontSize:13,color:'var(--dim)',marginTop:18}}>
              Already enlisted? <a href="#" onClick={e=>{e.preventDefault();setPage('login');}} style={{color:'var(--primary)',textDecoration:'underline',textUnderlineOffset:3}}>Sign In</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

// COMMAND CENTER
// ══════════════════════════════════════════
function CommandCenter(){
  const [issData,setIssData]=useState({latitude:28.6,longitude:77.2,altitude:408,velocity:27580});
  const [news,setNews]=useState(MOCK_NEWS);
  const [apod,setApod]=useState(null);
  const [loadingApod,setLoadingApod]=useState(true);

  useEffect(()=>{
    // Fetch APOD
    (async()=>{
      const d=await apiFetch(`${NASA_API}/planetary/apod?api_key=${NASA_KEY}`);
      if(d) setApod(d);
      setLoadingApod(false);
    })();
    // Fetch news
    (async()=>{
      const d=await apiFetch(NEWS_API);
      if(d?.results?.length) setNews(d.results.slice(0,4));
      else if(d?.length) setNews(d.slice(0,4));
    })();
    // ISS updates
    const interval=setInterval(async()=>{
      const d=await apiFetch(ISS_API);
      if(d) setIssData(prev=>({...prev,latitude:parseFloat(d.latitude),longitude:parseFloat(d.longitude),altitude:parseFloat(d.altitude),velocity:parseFloat(d.velocity)}));
    },5000);
    return ()=>clearInterval(interval);
  },[]);

  const kpiCards=[
    {label:'Active Satellites',value:'8,432',icon:'satellite_alt',color:'var(--primary)',delta:'+12 today',sub:'Orbit status: Nominal'},
    {label:'ISS Altitude',value:`${issData.altitude.toFixed(0)} km`,icon:'height',color:'var(--secondary)',delta:'',sub:`Vel: ${fmt(Math.round(issData.velocity))} km/h`},
    {label:'NEO Threats',value:'3',icon:'crisis_alert',color:'var(--red)',delta:'Elevated',sub:'1 flagged approach'},
    {label:'SpaceX Launches',value:'285',icon:'rocket_launch',color:'var(--accent)',delta:'Next: T-4d',sub:'Starship IFT-7'},

    <div style={{animation:'fadeIn 0.5s ease'}}>

          <div className="badge badge-live"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'pulseDot 2s infinite'}}/>Live</div>
        </div>
        <p style={{fontSize:14,color:'var(--dim)',fontFamily:'JetBrains Mono'}}>
          UTC {new Date().toUTCString().slice(5,25)} &nbsp;·&nbsp; All systems nominal &nbsp;·&nbsp; {Math.floor(Math.random()*20)+80}% uptime
        </p>
      </div>

      {/* KPI Cards */}
      <div className="grid-4" style={{marginBottom:24}}>
        {kpiCards.map((c,i)=>(
          <div key={i} className="stat-card hud-corner" style={{animationDelay:`${i*0.08}s`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
              <div style={{width:40,height:40,borderRadius:8,background:`${c.color}15`,border:`1px solid ${c.color}25`,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span className="msym" style={{color:c.color,fontSize:22}}>{c.icon}</span>
              </div>
              {c.delta&&<span style={{fontSize:11,color:c.color,fontWeight:600,letterSpacing:'0.06em'}}>{c.delta}</span>}
            </div>
            <div style={{fontSize:'clamp(22px,3vw,32px)',fontWeight:700,color:c.color,fontFamily:'Orbitron',marginBottom:4,textShadow:`0 0 20px ${c.color}60`}}>{c.value}</div>
            <div style={{fontSize:11,color:'var(--dim)',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:4}}>{c.label}</div>

// ISS Mini Map Canvas
function ISSMiniMap({issData}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width, H=canvas.height;
    ctx.clearRect(0,0,W,H);

    // Ocean
    ctx.fillStyle='#0a1628'; ctx.fillRect(0,0,W,H);

    // Grid
    ctx.strokeStyle='rgba(0,229,255,0.06)'; ctx.lineWidth=0.5;
    for(let x=0;x<W;x+=W/6){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=H/4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Continents (simplified)
    ctx.fillStyle='rgba(46,125,50,0.5)';
    const drawBlob=(cx,cy,rx,ry)=>{ctx.beginPath();ctx.ellipse(cx*W,cy*H,rx*W,ry*H,0,0,Math.PI*2);ctx.fill();};
    drawBlob(.16,.30,.08,.15); // N America
    drawBlob(.30,.55,.06,.12); // S America
    drawBlob(.50,.25,.05,.10); // Europe
    drawBlob(.50,.50,.07,.14); // Africa
    ctx.fillStyle='rgba(46,125,50,0.45)';
    drawBlob(.74,.28,.18,.18); // Asia
    drawBlob(.86,.64,.05,.08); // Australia

    // Equator
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();

    // ISS position
    const x=((issData.longitude+180)/360)*W;
    const y=((90-issData.latitude)/180)*H;
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle='var(--primary)||#00e5ff';
    ctx.shadowColor='#00e5ff'; ctx.shadowBlur=12;
    ctx.fillStyle='#00e5ff'; ctx.fill();
    ctx.shadowBlur=0;
    // Rings
    ctx.strokeStyle='rgba(0,229,255,0.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(0,229,255,0.15)';
    ctx.beginPath(); ctx.arc(x,y,16,0,Math.PI*2); ctx.stroke();

    // Orbit track
    ctx.strokeStyle='rgba(0,229,255,0.15)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath();
    for(let i=0;i<=360;i++){
      const angle=(i/180)*Math.PI;
      const lat=Math.sin(angle)*51.6;
      const lng=(issData.longitude-180+i)%360-180;
      const px=((lng+180)/360)*W;
      const py=((90-lat)/180)*H;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.setLineDash([]);
  },[issData]);

  return <canvas ref={canvasRef} width={400} height={200} style={{width:'100%',height:200,borderRadius:10}}/>;
}

function ISSTracker(){
  const [issData,setIssData]=useState({latitude:28.6,longitude:77.2,altitude:408.5,velocity:27580,footprint:4540});
  const [crew]=useState([
    {name:'Oleg Kononenko',role:'Commander',country:'🇷🇺'},
    {name:'Nikolai Chub',role:'Flight Engineer',country:'🇷🇺'},
    {name:'Tracy Dyson',role:'Flight Engineer',country:'🇺🇸'},
    {name:'Matthew Dominick',role:'Flight Engineer',country:'🇺🇸'},
    {name:'Michael Barratt',role:'Flight Engineer',country:'🇺🇸'},
    {name:'Jeanette Epps',role:'Flight Engineer',country:'🇺🇸'},
    {name:'Alexander Grebenkin',role:'Flight Engineer',country:'🇷🇺'},
  ]);
  const [passTime,setPassTime]=useState(null);
  const canvasRef=useRef(null);

  useEffect(()=>{
    const update=async()=>{
      const d=await apiFetch(ISS_API);
      if(d) setIssData({latitude:parseFloat(d.latitude),longitude:parseFloat(d.longitude),altitude:parseFloat(d.altitude),velocity:parseFloat(d.velocity),footprint:parseFloat(d.footprint)||4540});
    };
    update();
    const iv=setInterval(update,5000);
    return ()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    const W=canvas.clientWidth*2; const H=canvas.clientHeight*2;
    canvas.width=W; canvas.height=H;

    // Ocean
    const og=ctx.createLinearGradient(0,0,0,H);
    og.addColorStop(0,'#040e1e'); og.addColorStop(1,'#061426');
    ctx.fillStyle=og; ctx.fillRect(0,0,W,H);

    // Grid lines
    ctx.strokeStyle='rgba(0,229,255,0.05)'; ctx.lineWidth=1;
    for(let x=0;x<W;x+=W/12){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=H/6){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // Latitude lines
    ctx.strokeStyle='rgba(0,229,255,0.08)'; ctx.lineWidth=1;
    [30,60,-30,-60].forEach(lat=>{
      const y=((90-lat)/180)*H;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
    });

    // Equator
    ctx.strokeStyle='rgba(0,229,255,0.18)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();

    // Prime meridian
    ctx.strokeStyle='rgba(0,229,255,0.18)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();

    // Continents (detailed)
    const drawPoly=(pts,col,alpha=0.5)=>{
      ctx.fillStyle=col; ctx.globalAlpha=alpha;
      ctx.beginPath(); ctx.moveTo(pts[0][0]*W,pts[0][1]*H);
      pts.slice(1).forEach(([px,py])=>ctx.lineTo(px*W,py*H));
      ctx.closePath(); ctx.fill(); ctx.globalAlpha=1;
    };
    const G='#2e7d32',G2='#33691e',D='#5d4037';
    drawPoly([[.07,.10],[.14,.07],[.24,.09],[.33,.17],[.36,.27],[.31,.40],[.27,.50],[.22,.57],[.15,.59],[.10,.52],[.06,.42],[.05,.30],[.06,.20]],G);
    drawPoly([[.285,.44],[.32,.42],[.38,.47],[.40,.56],[.38,.66],[.34,.72],[.28,.69],[.26,.60],[.25,.50]],G2);
    drawPoly([[.46,.31],[.51,.27],[.57,.30],[.59,.40],[.58,.56],[.55,.67],[.51,.70],[.47,.67],[.44,.56],[.43,.42]],D);
    drawPoly([[.55,.12],[.68,.08],[.82,.09],[.93,.13],[.99,.20],[.97,.35],[.89,.44],[.78,.48],[.65,.50],[.57,.40],[.54,.25],[.55,.17]],G);
    drawPoly([[.47,.21],[.53,.18],[.56,.23],[.53,.30],[.48,.28]],G);
    drawPoly([[.285,.08],[.34,.05],[.38,.11],[.36,.19],[.29,.19],[.28,.14]],G2,.4);
    drawPoly([[.81,.57],[.87,.56],[.93,.59],[.95,.65],[.92,.73],[.87,.75],[.80,.72],[.79,.65]],D);
    // Antarctica
    ctx.fillStyle='rgba(180,220,255,0.3)'; ctx.globalAlpha=0.8;
    ctx.fillRect(0,H*.84,W,H*.16); ctx.globalAlpha=1;
    // Arctic
    ctx.fillStyle='rgba(180,220,255,0.3)'; ctx.fillRect(0,0,W,H*.04);

    // ISS footprint
    const ix=((issData.longitude+180)/360)*W;
    const iy=((90-issData.latitude)/180)*H;
    const footprintPx=(issData.footprint/40000)*W*0.5;
    const grd=ctx.createRadialGradient(ix,iy,0,ix,iy,footprintPx);
    grd.addColorStop(0,'rgba(0,229,255,0.08)');
    grd.addColorStop(0.7,'rgba(0,229,255,0.03)');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(ix,iy,footprintPx,0,Math.PI*2); ctx.fill();

    // Orbit track
    ctx.strokeStyle='rgba(0,229,255,0.18)'; ctx.lineWidth=1.5; ctx.setLineDash([6,6]);
    ctx.beginPath();
    let first=true;
    for(let i=0;i<=720;i++){
      const t=(i/360)*Math.PI*2;
      const lat=Math.sin(t)*51.6;
      const lngOffset=(issData.longitude-180+(i*0.5))%360;
      const lng=lngOffset<-180?lngOffset+360:lngOffset>180?lngOffset-360:lngOffset;
      const px=((lng+180)/360)*W;
      const py=((90-lat)/180)*H;
      if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);
    }
    ctx.stroke(); ctx.setLineDash([]);

    // ISS marker
    ctx.shadowColor='#00e5ff'; ctx.shadowBlur=20;
    ctx.fillStyle='#00e5ff';
    ctx.beginPath(); ctx.arc(ix,iy,7,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,229,255,0.6)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(ix,iy,14,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(0,229,255,0.25)';
    ctx.beginPath(); ctx.arc(ix,iy,22,0,Math.PI*2); ctx.stroke();

    // ISS label
    ctx.fillStyle='rgba(0,229,255,0.9)'; ctx.font=`${12*2}px 'Orbitron',sans-serif`;
    ctx.fillText('ISS', ix+18, iy-10);
  },[issData]);

  return (
    <div style={{animation:'fadeIn 0.5s ease'}}>
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <h1 className="orb" style={{fontSize:'clamp(18px,2.5vw,26px)',fontWeight:700}}>ISS Live Tracker</h1>
          <div className="badge badge-live"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'pulseDot 1.5s infinite'}}/>Real-Time</div>
        </div>
      </div>

      {/* Telemetry bar */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12,marginBottom:20}}>
        {[
          {l:'Altitude',v:`${issData.altitude.toFixed(1)} km`,icon:'height',c:'var(--primary)'},
          {l:'Velocity',v:`${fmt(Math.round(issData.velocity))} km/h`,icon:'speed',c:'var(--secondary)'},
          {l:'Latitude',v:`${issData.latitude.toFixed(3)}°`,icon:'location_on',c:'var(--accent)'},
          {l:'Longitude',v:`${issData.longitude.toFixed(3)}°`,icon:'explore',c:'var(--green)'},
          {l:'Footprint',v:`${fmt(Math.round(issData.footprint))} km`,icon:'radar',c:'var(--primary)'},
          {l:'Crew',v:'7 People',icon:'groups',c:'var(--secondary)'},
        ].map((d,i)=>(
          <div key={i} className="stat-card" style={{padding:'14px 16px',textAlign:'center'}}>
            <span className="msym" style={{fontSize:22,color:d.c,display:'block',marginBottom:6}}>{d.icon}</span>
            <div style={{fontSize:'clamp(15px,2vw,20px)',fontWeight:700,color:d.c,fontFamily:'JetBrains Mono'}}>{d.v}</div>
            <div style={{fontSize:11,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'0.08em',marginTop:3}}>{d.l}</div>
          </div>
        ))}
      </div>

      {/* Map */}
      <div className="glass-card" style={{padding:0,borderRadius:14,overflow:'hidden',marginBottom:20}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
          <span className="msym" style={{color:'var(--primary)'}}>map</span>
          <span className="orb" style={{fontSize:14,fontWeight:600}}>Global Orbital Map</span>
          <div className="badge badge-live" style={{marginLeft:'auto'}}><span style={{width:5,height:5,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'pulseDot 1.5s infinite'}}/>Tracking</div>
        </div>
        <div style={{position:'relative'}}>
          <canvas ref={canvasRef} style={{width:'100%',height:'clamp(280px,40vw,480px)',display:'block'}}/>
        </div>
      </div>

      {/* Crew */}
      <div className="glass-card" style={{padding:20,borderRadius:14}}>
        <div className="section-head">
          <div className="section-icon" style={{background:'rgba(124,58,237,0.1)',borderColor:'rgba(124,58,237,0.2)'}}><span className="msym" style={{color:'var(--secondary)',fontSize:20}}>groups</span></div>
          <span className="section-title">Expedition 71 Crew — 7 Members</span>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>
          {crew.map((c,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:12,background:'rgba(0,0,0,0.3)',borderRadius:10,padding:'12px 14px',border:'1px solid rgba(255,255,255,0.04)'}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:`hsl(${i*50},60%,25%)`,border:'1px solid rgba(255,255,255,0.1)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,fontWeight:700,color:'white'}}>
                {c.name.split(' ').map(n=>n[0]).join('')}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:2}}>{c.country} {c.name}</div>

      </div>
    </div>
  );
}

    })();

        const t=new Date(l.date_utc).getTime()-now;

        }else cd[l.id]=null;
      });

            <div style={{fontSize:11,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'0.08em',marginTop:4}}>{s.l}</div>

// ASTEROID MONITOR
// ══════════════════════════════════════════
function AsteroidMonitor(){
  const [asteroids,setAsteroids]=useState([]);
  const [loading,setLoading]=useState(true);
  const [chartReady,setChartReady]=useState(false);
  const chartRef=useRef(null);
  const chartInstance=useRef(null);

  useEffect(()=>{
    (async()=>{
      const today=new Date().toISOString().slice(0,10);
      const d=await apiFetch(`${NASA_API}/neo/rest/v1/feed?start_date=${today}&end_date=${today}&api_key=${NASA_KEY}`);
      if(d?.near_earth_objects){
        const all=Object.values(d.near_earth_objects).flat().slice(0,16);
        setAsteroids(all);
      } else {
        // Mock asteroids
        setAsteroids(Array.from({length:10},(_,i)=>({
          name:`2024-XQ${i+1}`,
          estimated_diameter:{kilometers:{estimated_diameter_max:(Math.random()*2+0.05).toFixed(2)}},
          is_potentially_hazardous_asteroid:i<2,
          close_approach_data:[{miss_distance:{kilometers:fmt(Math.floor(Math.random()*8000000+500000))},relative_velocity:{kilometers_per_second:(Math.random()*30+5).toFixed(2)},close_approach_date:today}]
        })));
      }
      setLoading(false);
      setChartReady(true);
    })();
  },[]);

  useEffect(()=>{
    if(!chartReady||!chartRef.current||asteroids.length===0) return;
    if(chartInstance.current) chartInstance.current.destroy();
    const ctx=chartRef.current.getContext('2d');
    const sizes=asteroids.slice(0,8).map(a=>parseFloat(a.estimated_diameter?.kilometers?.estimated_diameter_max||0.1).toFixed(3));
    const names=asteroids.slice(0,8).map(a=>a.name?.replace('(','').replace(')','').slice(0,12));
    chartInstance.current=new Chart(ctx,{
      type:'bar',
      data:{labels:names,datasets:[{label:'Diameter (km)',data:sizes,backgroundColor:asteroids.slice(0,8).map(a=>a.is_potentially_hazardous_asteroid?'rgba(255,23,68,0.6)':'rgba(0,229,255,0.5)'),borderColor:asteroids.slice(0,8).map(a=>a.is_potentially_hazardous_asteroid?'#ff1744':'#00e5ff'),borderWidth:1}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{titleColor:'#e2e8f7',bodyColor:'#64748b',backgroundColor:'rgba(4,12,24,0.95)',borderColor:'rgba(0,229,255,0.2)',borderWidth:1}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b',font:{size:11}},title:{display:true,text:'Diameter (km)',color:'#64748b',font:{size:11}}}}}
    });
    return ()=>{if(chartInstance.current) chartInstance.current.destroy();};
  },[chartReady,asteroids]);

  const threatLevel=(a)=>{
    if(a.is_potentially_hazardous_asteroid) return 2;
    const dist=parseFloat(a.close_approach_data?.[0]?.miss_distance?.kilometers?.toString().replace(/,/g,'')||9e9);
    if(dist<1e6) return 1;
    return 0;
  };
  const threatColors=['var(--green)','var(--yellow)','var(--red)'];
  const threatLabels=['Nominal','Caution','Hazardous'];

  return (
    <div style={{animation:'fadeIn 0.5s ease'}}>
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <h1 className="orb" style={{fontSize:'clamp(18px,2.5vw,26px)',fontWeight:700}}>Asteroid Watch</h1>
          <div className="badge badge-scheduled"><span className="msym" style={{fontSize:14}}>crisis_alert</span>NEO ALERT</div>
        </div>
        <p style={{fontSize:13,color:'var(--dim)'}}>NASA NeoWs — Near-Earth Object monitoring, today's approaches</p>
      </div>

      {/* Summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:20}}>
        {[
          {l:'Tracked Today',v:asteroids.length,i:'radar',c:'var(--primary)'},
          {l:'Hazardous',v:asteroids.filter(a=>a.is_potentially_hazardous_asteroid).length,i:'warning',c:'var(--red)'},
          {l:'Closest (km)',v:asteroids[0]?.close_approach_data?.[0]?.miss_distance?.kilometers?.toString().slice(0,8)||'—',i:'my_location',c:'var(--accent)'},
          {l:'Threat Level',v:'Low',i:'shield',c:'var(--green)'},
        ].map((s,i)=>(
          <div key={i} className="stat-card" style={{padding:'16px 14px',textAlign:'center'}}>
            <span className="msym" style={{fontSize:24,color:s.c,display:'block',marginBottom:6}}>{s.i}</span>
            <div className="orb" style={{fontSize:'clamp(18px,2.5vw,26px)',fontWeight:700,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--dim)',textTransform:'uppercase',letterSpacing:'0.08em',marginTop:4}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Chart */}
      <div className="glass-card" style={{padding:20,borderRadius:14,marginBottom:20}}>
        <div className="section-head">
          <div className="section-icon"><span className="msym" style={{fontSize:20}}>bar_chart</span></div>
          <span className="section-title">Estimated Diameter Distribution</span>
          <div style={{marginLeft:'auto',display:'flex',gap:10}}>
            <span style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'var(--dim)'}}><span style={{width:10,height:10,borderRadius:2,background:'rgba(0,229,255,0.5)',display:'inline-block'}}/> Normal</span>
            <span style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'var(--dim)'}}><span style={{width:10,height:10,borderRadius:2,background:'rgba(255,23,68,0.6)',display:'inline-block'}}/> Hazardous</span>
          </div>
        </div>
        <canvas ref={chartRef} style={{maxHeight:260}}/>
      </div>

      {/* Asteroid table */}
      {loading?(
        <div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spin-loader" style={{width:40,height:40}}/></div>
      ):(
        <div className="glass-card" style={{padding:20,borderRadius:14}}>
          <div className="section-head">
            <div className="section-icon" style={{background:'rgba(255,23,68,0.1)',borderColor:'rgba(255,23,68,0.2)'}}><span className="msym" style={{color:'var(--red)',fontSize:20}}>crisis_alert</span></div>
            <span className="section-title">Today's Close Approaches</span>
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border)'}}>
                  {['Object','Diameter (km)','Miss Distance','Velocity (km/s)','Threat'].map(h=>(
                    <th key={h} style={{padding:'8px 12px',textAlign:'left',color:'var(--dim)',fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {asteroids.slice(0,12).map((a,i)=>{
                  const t=threatLevel(a);
                  return (
                    <tr key={i} style={{borderBottom:'1px solid rgba(255,255,255,0.03)',transition:'background 0.2s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(0,229,255,0.03)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                      <td style={{padding:'10px 12px',fontWeight:600,color:'var(--text)',whiteSpace:'nowrap'}}>{a.name?.replace(/[()]/g,'').slice(0,20)}</td>
                      <td style={{padding:'10px 12px',color:'var(--dim)',fontFamily:'JetBrains Mono'}}>{parseFloat(a.estimated_diameter?.kilometers?.estimated_diameter_max||0).toFixed(4)}</td>
                      <td style={{padding:'10px 12px',color:'var(--dim)',fontFamily:'JetBrains Mono',whiteSpace:'nowrap'}}>{a.close_approach_data?.[0]?.miss_distance?.kilometers?.toString().slice(0,12)||'—'} km</td>
                      <td style={{padding:'10px 12px',color:'var(--dim)',fontFamily:'JetBrains Mono'}}>{parseFloat(a.close_approach_data?.[0]?.relative_velocity?.kilometers_per_second||0).toFixed(2)}</td>
                      <td style={{padding:'10px 12px'}}>
                        <span style={{color:threatColors[t],fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
                          <span style={{width:7,height:7,borderRadius:'50%',background:threatColors[t],display:'inline-block',boxShadow:`0 0 6px ${threatColors[t]}`}}/>
                          {threatLabels[t]}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// AI ORACLE

function AIOracle(){
  const [messages,setMessages]=useState([
    {role:'ai',text:"I am ORACLE — AetherOS's neural space intelligence. Ask me about missions, celestial mechanics, or anything in the cosmos. How can I assist today, Commander?"}
  ]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [apiKey,setApiKey]=useState('');
  const [showKeyInput,setShowKeyInput]=useState(false);
  const chatEndRef=useRef(null);

  useEffect(()=>{ chatEndRef.current?.scrollIntoView({behavior:'smooth'}); },[messages]);

  const mockReplies=[
    "The International Space Station orbits Earth at approximately 408 km altitude, completing 15.5 orbits daily at 27,600 km/h. It's as large as a football field and houses up to 10 crew members.",
    "SpaceX's Starship is designed for Mars colonization — a fully reusable two-stage vehicle. The Super Heavy booster generates 16.7 million pounds of thrust from 33 Raptor engines.",
    "NASA's Artemis program aims to return humans to the Moon by 2026, establishing a permanent Gateway lunar station as a stepping stone for eventual Mars missions.",
    "Near-Earth Objects (NEOs) are tracked by NASA's Planetary Defense Coordination Office. The DART mission successfully deflected asteroid Dimorphos in 2022.",
    "The James Webb Space Telescope (JWST) orbits at L2, 1.5 million km from Earth. Its 6.5m mirror captures infrared light, revealing galaxies over 13 billion light-years away.",
    "Mars has two tiny moons — Phobos and Deimos. Phobos orbits so close it will eventually break apart from tidal forces, creating a ring around Mars in ~50 million years.",
    "A black hole is a region where gravity is so intense that not even light can escape past the event horizon. The supermassive black hole at our galaxy's center is 4 million solar masses.",
  ];

  const send=async()=>{
    if(!input.trim()||loading) return;
    const userMsg=input.trim();
    setInput('');
    setMessages(m=>[...m,{role:'user',text:userMsg}]);
    setLoading(true);
    await sleep(300);

    if(apiKey){
      // Real Gemini API
      const res=await apiFetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,null);

    setMessages(m=>[...m,{role:'ai',text:reply}]);
    setLoading(false);

      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:16,alignItems:'start'}}>
        {/* Chat */}
        <div className="glass-card" style={{borderRadius:14,overflow:'hidden',display:'flex',flexDirection:'column',height:'calc(100vh - 200px)',minHeight:500}}>
          {/* Oracle header */}
          <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:14}}>
            <div style={{position:'relative',width:52,height:52,flexShrink:0}}>
              <div style={{position:'absolute',inset:0,borderRadius:'50%',border:'1px solid rgba(124,58,237,0.4)',animation:'pulse-ring 2s ease-out infinite'}}/>
              <div style={{width:52,height:52,borderRadius:'50%',background:'linear-gradient(135deg,rgba(124,58,237,0.2),rgba(0,229,255,0.2))',border:'1px solid rgba(124,58,237,0.4)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <span className="msym" style={{fontSize:28,color:'var(--secondary)',filter:'drop-shadow(0 0 8px rgba(124,58,237,0.8))'}}>psychology</span>
              </div>
            </div>
            <div style={{flex:1}}>
              <div className="orb" style={{fontSize:15,fontWeight:600,color:'var(--text)'}}>ORACLE Neural Interface</div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginTop:3}}>

                <span style={{fontSize:11,color:'var(--dim)'}}>v4.2 · Gemini Core</span>
              </div>
            </div>
            <button onClick={()=>setShowKeyInput(!showKeyInput)} style={{background:'none',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px',color:'var(--dim)',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:5,transition:'all 0.2s'}} onMouseEnter={e=>e.currentTarget.style.color='var(--primary)'} onMouseLeave={e=>e.currentTarget.style.color='var(--dim)'}>

            <div style={{fontSize:12,color:'var(--primary)',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:12}}>Quick Queries</div>
            {suggestions.map((s,i)=>(
              <button key={i} onClick={()=>{setInput(s);}} style={{display:'block',width:'100%',textAlign:'left',background:'rgba(0,0,0,0.3)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:8,padding:'10px 12px',color:'var(--dim)',fontSize:13,cursor:'pointer',marginBottom:6,transition:'all 0.2s',fontFamily:'Rajdhani'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='rgba(0,229,255,0.2)';e.currentTarget.style.color='var(--text)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='rgba(255,255,255,0.05)';e.currentTarget.style.color='var(--dim)';}}>
                <span className="msym" style={{fontSize:14,verticalAlign:'middle',marginRight:6,color:'var(--primary)'}}>auto_awesome</span>
                {s}
              </button>
            ))}
          </div>

          <div className="glass-card" style={{padding:18,borderRadius:12}}>
            <div style={{fontSize:12,color:'var(--primary)',fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:12}}>System Status</div>
            {[
              {l:'Neural Core',v:'Online',c:'var(--green)'},
              {l:'Data Feed',v:'Live',c:'var(--green)'},
              {l:'Gemini API',v:apiKey?'Connected':'Demo Mode',c:apiKey?'var(--green)':'var(--yellow)'},
              {l:'Response Latency',v:'<500ms',c:'var(--primary)'},
            ].map((s,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:i<3?'1px solid rgba(255,255,255,0.04)':''}}>
                <span style={{fontSize:12,color:'var(--dim)'}}>{s.l}</span>
                <span style={{fontSize:12,fontWeight:600,color:s.c,display:'flex',alignItems:'center',gap:4}}>
                  <span style={{width:5,height:5,borderRadius:'50%',background:s.c,display:'inline-block'}}/>
                  {s.v}
                </span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ROOT APP
// ══════════════════════════════════════════
function App(){
  const [page,setPage]=useState('landing');
  const [section,setSection]=useState('command');
  const [user,setUser]=useState(null);

  const ctx={page,setPage,section,setSection,user,setUser};

  const renderSection=()=>{
    switch(section){
      case 'command': return <CommandCenter/>;
      case 'iss': return <ISSTracker/>;
      case 'spacex': return <SpaceXDashboard/>;
      case 'nasa': return <NASAGallery/>;
      case 'asteroids': return <AsteroidMonitor/>;
      case 'ai': return <AIOracle/>;
      case 'profile': return <UserProfile user={user}/>;
      default: return <CommandCenter/>;
    }
  };

  return (
    <AppCtx.Provider value={ctx}>
      {/* Landing */}
      <div id="page-landing" className={`page ${page==='landing'?'active':''}`}>
        {page==='landing'&&<LandingPage/>}
      </div>
      {/* Login */}
      <div id="page-login" className={`page ${page==='login'?'active':''}`}>
        {page==='login'&&<LoginPage/>}
      </div>
      {/* Signup */}
      <div id="page-signup" className={`page ${page==='signup'?'active':''}`}>
        {page==='signup'&&<SignupPage/>}
      </div>
      {/* Dashboard */}
      <div id="page-dashboard" className={`page ${page==='dashboard'?'active':''}`}>
        {page==='dashboard'&&(
          <DashboardLayout activeSection={section} setSection={setSection} user={user||{name:'Commander',avatar:'UC'}} setPage={setPage}>
            {renderSection()}
          </DashboardLayout>
        )}
      </div>
    </AppCtx.Provider>
  );
}

// Mount
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>

<!-- Responsive adjustments via JS -->
<script>
(function(){
  function applyResponsive(){
    const W=window.innerWidth;
    const isLg=W>=1024;
    const isMd=W>=768;
    // Search box
    const sw=document.getElementById('search-wrap');
    if(sw) sw.style.display=isMd?'block':'none';
    // Menu button
    const mb=document.getElementById('menu-btn');
    if(mb) mb.style.display=isLg?'none':'flex';
    // Sidebar
    const sb=document.getElementById('main-sidebar');
    if(sb&&isLg) sb.classList.remove('closed');
  }
  window.addEventListener('resize',applyResponsive);
  // Run after React mounts
  setTimeout(applyResponsive,500);
  setInterval(applyResponsive,2000);
})();
</script>
